// 🔧 AUTO DATA FIX
function fixOldData(){

["income","expense","monthly","utsav"].forEach(path=>{
db.ref("data/"+year+"/"+path).once("value",snap=>{
let data=snap.val()||{};
Object.keys(data).forEach(k=>{
if(data[k].locked===undefined){
db.ref("data/"+year+"/"+path+"/"+k+"/locked").set(false);
}
});
});
});
  
}

function migrateOldData(){

const paths = ["monthly","income","expense","utsav"];

paths.forEach(p=>{
db.ref(p).once("value",snap=>{
let data = snap.val();

if(data && Object.keys(data).length > 0){

/* 🔥 merge instead of overwrite */
db.ref("data/"+year+"/"+p).update(data);

console.log(p + " migrated");

}else{
console.log(p + " empty");
}

});
});

alert("Migration Done");

}
// 🔄 RESET APPROVAL
function resetApproval(){
db.ref("settings/approvals").set({
adhyaksha:false,
upadhyaksha:false,
member:false
});
}

// 🔒 EDIT CONTROL
function canEdit(v){

// 🔥 अगर data ही empty है → हमेशा editable
if(!v || (!v.a && !v.d)){
  return true;
}

// सिर्फ admin edit करेगा
if(!isAdmin) return false;

// 🔥 अगर locked field ही नहीं है → NEW DATA
if(v?.locked === undefined) return true;

// 🔥 अगर unlocked है
if(v.locked === false) return true;

// 🔒 locked → approval चाहिए
if(
v.locked === true &&
approvals.adhyaksha &&
approvals.upadhyaksha &&
approvals.member
){
return true;
}

return false;

}

// PENALTY
function penalty(d){
if(!d)return 0;
let day=new Date(d).getDate();
return day>1?(day-1)*10:0;
}

// DASHBOARD
function dashboard(){

app.innerHTML = `
<div class="title">
📊 Dashboard 

<select id="yearSelect" onchange="changeYear()"></select>

<button onclick="downloadPDF()">📄 PDF</button>
<button onclick="backupData()">💾 Backup</button>

<!-- ✅ YAH ADD KARO -->
<button onclick="installApp()">📲 Install</button>

</div>

`;

loadYears();      

// 🔥 IMPORTANT: yahi hona chahiye
db.ref("data/"+year).on("value",s=>{
let d=s.val()||{};
let sum=o=>Object.values(o||{}).reduce((a,b)=>a+(b.a||0),0);

let monthly=sum(d.monthly);
let utsav=sum(d.utsav);
let income=sum(d.income);
let expense=sum(d.expense);

let pen=0;
Object.values(d.monthly||{}).forEach(v=>pen+=penalty(v.d));

let open=d.settings?.open||0;

out.innerHTML=`
<div class='card'>💰 Opening<br><div class='big'>₹${open}</div></div>
<div class='card'>🗓️ Monthly<br><div class='big'>₹${monthly}</div></div>
<div class='card'>🧾 Penalty<br><div class='big'>₹${pen}</div></div>
<div class='card'>🎊 Utsav<br><div class='big'>₹${utsav}</div></div>
<div class='card'>📥 Income<br><div class='big'>₹${income}</div></div>
<div class='card'>📤 Expense<br><div class='big'>₹${expense}</div></div>
<div class='card'>🏦 Balance<br><div class='big'>₹${open+monthly+pen+utsav+income-expense}</div></div>
`;
});

}

function loadYears(){

let select = document.getElementById("yearSelect");

db.ref("data").once("value",snap=>{
let years = snap.val();

if(!years){
  // 🔥 agar kuch bhi data nahi hai
  select.innerHTML = `<option>${year}</option>`;
  return;
}

let keys = Object.keys(years);

// 🔥 current year add karo agar missing hai
if(!keys.includes(String(year))){
  keys.push(String(year));
}

select.innerHTML = keys.map(y=>`
<option ${y==year?"selected":""}>${y}</option>
`).join("");

});

}

function changeYear(){
year = document.getElementById("yearSelect").value;
dashboard();
}

function addMember(){
  
if(role !== "admin"){
return alert("Only admin can add member");
}

const nameInput = document.getElementById("name");
const postInput = document.getElementById("post");

const n = nameInput.value.trim();
const p = postInput.value.trim();

if(!n) return alert("Name required");

db.ref("members").push({
name:n,
post:p
});

/* 🔥 only name clear */
nameInput.value = "";
nameInput.focus();
/* ❌ post ko mat chhedo */
}


function updateMember(id,field,value){

if(role!=="admin"){
return alert("Only admin can edit");
}

db.ref("members/"+id).update({
[field]:value
});

}
  
function deleteMember(id){

if(role!=="admin"){
return alert("Only admin can delete");
}

if(!confirm("Delete member?")) return;

db.ref("members/"+id).remove();

  }

function save(k,t,v){
// 🔒 ADMIN CHECK (सबसे ऊपर)
if(role !== "admin"){
  return alert("Only admin can edit");
}
  
db.ref("data/"+year+"/monthly/"+k).once("value",snap=>{
let val = snap.val() || {};

// 🔥 अगर empty हो रहा है → unlock
if((t==="a" && !v) && !val.d){
  db.ref("data/"+year+"/monthly/"+k).set({
    a:"",
    d:"",
    locked:false
  });
  return;
}

if((t==="d" && !v) && !val.a){
  db.ref("data/"+year+"/monthly/"+k).set({
    a:"",
    d:"",
    locked:false
  });
  return;
}

// normal edit check
if(!canEdit(val)){
  return alert("Locked data - approval required");
}

db.ref("data/"+year+"/monthly/"+k).update({
[t]:t==="a"?+v:v
});

resetApproval();

});
}

// DELETE
function del(id,path){
db.ref("data/"+year+"/"+path+"/"+id).once("value",snap=>{
let val=snap.val()||{};

if(!canEdit(val)){
return alert("Locked data - approval required");
}

db.ref("data/"+year+"/"+path+"/"+id).remove();
resetApproval();
});
}

6K8JN0V5eO0iz30W3F671NNSPezdbVdemM8x2M...";
    
  // ---------- HELPERS ----------
  const currency = n => `₹${(+n||0).toLocaleString("en-IN")}`;
  const todayStr = new Date().toLocaleDateString();

  function penalty(d){
    if(!d) return 0;
    let day = new Date(d).getDate();
    return day>1 ? (day-1)*10 : 0;
  }

  // ---------- HEADER + FOOTER ----------
  function headerFooter(){

    // Header
    doc.setFillColor(255,111,0);
    doc.rect(0,0,pageW,60,"F");

    doc.addImage(LOGO, "PNG", 20, 10, 40, 40);

    doc.setTextColor(255,255,255);
    doc.setFontSize(16);
    doc.text("JAI SHREE RAM NAVYUVAK SAMITI", pageW/2, 25, {align:"center"});

    doc.setFontSize(10);
    doc.text(`Financial Report • ${year}`, pageW/2, 42, {align:"center"});

    // Footer
    doc.setTextColor(100);
    doc.setFontSize(9);
    doc.text(`Generated: ${todayStr}`, 20, pageH-15);

    let pageNo = doc.internal.getCurrentPageInfo().pageNumber;
    doc.text(`Page ${pageNo}`, pageW-60, pageH-15);
  }

  const didDrawPage = () => headerFooter();

  // ---------- FETCH ----------
  const snap = await db.ref("data/"+year).once("value");
  let d = snap.val() || {};

  let sum = o => Object.values(o||{}).reduce((a,b)=>a+(+b.a||0),0);

  let monthly = sum(d.monthly);
  let utsav = sum(d.utsav);
  let income = sum(d.income);
  let expense = sum(d.expense);

  let pen = 0;
  Object.values(d.monthly||{}).forEach(v=> pen += penalty(v.d));

  let open = d.settings?.open || 0;
  let balance = open + monthly + pen + utsav + income - expense;

  // ---------- KPI CARDS ----------
  let y = 80;

  function card(x,y,w,h,title,val,color){
    doc.setFillColor(245,245,245);
    doc.roundedRect(x,y,w,h,8,8,"F");

    doc.setFillColor(...color);
    doc.roundedRect(x,y,w,6,6,6,"F");

    doc.setTextColor(80);
    doc.setFontSize(10);
    doc.text(title, x+10, y+22);

    doc.setTextColor(...color);
    doc.setFontSize(14);
    doc.text(currency(val), x+10, y+40);
  }

  const gap = 10;
  const w = (pageW-40-gap*2)/3;
  const h = 55;

  card(20,y,w,h,"Opening",open,[120,120,120]);
  card(20+w+gap,y,w,h,"Monthly",monthly,[255,111,0]);
  card(20+(w+gap)*2,y,w,h,"Penalty",pen,[255,152,0]);

  y += h + gap;

  card(20,y,w,h,"Utsav",utsav,[156,39,176]);
  card(20+w+gap,y,w,h,"Income",income,[0,150,0]);
  card(20+(w+gap)*2,y,w,h,"Expense",expense,[200,0,0]);

  y += h + 15;

  // ---------- BALANCE BOX ----------
  doc.setFillColor(0,120,0);
  doc.roundedRect(20,y,pageW-40,30,8,8,"F");

  doc.setTextColor(255,255,255);
  doc.setFontSize(14);
  doc.text(`Final Balance: ${currency(balance)}`, pageW/2, y+20, {align:"center"});

  y += 45;

  // ---------- MONTHLY ----------
  let monthlyRows = Object.entries(d.monthly||{}).map(([k,v])=>[
    k, currency(v.a||0), v.d||"-", currency(penalty(v.d))
  ]);

  if(monthlyRows.length===0) monthlyRows=[["No Data","-","-","-"]];

  doc.autoTable({
    startY:y,
    head:[["Member/Month","Amount","Date","Penalty"]],
    body:monthlyRows,
    headStyles:{fillColor:[255,111,0]},
    margin:{left:20,right:20},
    didDrawPage
  });

  y = doc.lastAutoTable.finalY + 10;

  // ---------- UTSAV ----------
  let utsavRows = Object.entries(d.utsav||{}).map(([k,v])=>[k,currency(v.a||0)]);
  if(utsavRows.length===0) utsavRows=[["No Data","-"]];

  doc.autoTable({
    startY:y,
    head:[["Utsav","Amount"]],
    body:utsavRows,
    headStyles:{fillColor:[156,39,176]},
    margin:{left:20,right:20},
    didDrawPage
  });

  y = doc.lastAutoTable.finalY + 10;

  // ---------- INCOME ----------
  let incomeRows = Object.values(d.income||{}).map(v=>[v.d||"-",currency(v.a)]);
  if(incomeRows.length===0) incomeRows=[["No Data","-"]];

  doc.autoTable({
    startY:y,
    head:[["Income Source","Amount"]],
    body:incomeRows,
    headStyles:{fillColor:[0,150,0]},
    margin:{left:20,right:20},
    didDrawPage
  });

  y = doc.lastAutoTable.finalY + 10;

  // ---------- EXPENSE ----------
  let expenseRows = Object.values(d.expense||{}).map(v=>[v.d||"-",currency(v.a)]);
  if(expenseRows.length===0) expenseRows=[["No Data","-"]];

  doc.autoTable({
    startY:y,
    head:[["Expense","Amount"]],
    body:expenseRows,
    headStyles:{fillColor:[200,0,0]},
    margin:{left:20,right:20},
    didDrawPage
  });

  // ---------- WATERMARK ----------
  doc.setTextColor(230);
  doc.setFontSize(40);
  doc.text("JAI SHREE RAM", pageW/2, pageH/2, {
    align:"center",
    angle:45
  });

  // ---------- SIGN ----------
  let sigY = pageH - 80;

  doc.setDrawColor(150);
  doc.line(40,sigY,200,sigY);
  doc.text("Adhyaksha", 40, sigY+15);

  doc.line(250,sigY,410,sigY);
  doc.text("Sachiv", 250, sigY+15);

  // FIRST PAGE HEADER
  doc.setPage(1);
  headerFooter();

  // SAVE
  doc.save(`Samiti_Ultra_${year}.pdf`);
           }

<h3>Opening Balance</h3>
<input id="openAmt" type="number">
<button onclick="saveOpen()">Save</button>

<h3>Restore data</h3>
<input type="file" id="restoreFile">

<button onclick="approve()">✅ Approve</button>

function backupData(){

db.ref("data/"+year).once("value",snap=>{
let data = snap.val();

let blob = new Blob([JSON.stringify(data,null,2)], {
type:"application/json"
});

let a = document.createElement("a");
a.href = URL.createObjectURL(blob);
a.download = "backup_"+year+".json";
a.click();

});

}

function restoreData(){

if(role !== "admin"){
return alert("Admin only");
}

let file = document.getElementById("restoreFile").files[0];

if(!file) return alert("File select karo");

let reader = new FileReader();

reader.onload = function(e){

try{

let data = JSON.parse(e.target.result);

// 🔥 overwrite data
db.ref("data/"+year).set(data);

alert("✅ Restore complete");

}catch(err){
alert("❌ Invalid file");
}

};

reader.readAsText(file);

}
  
function login(){
let r=roleSelect.value;

if(pass.value===passwords[r]){
role=r;
isAdmin = (r==="admin");
alert(r+" login");
}else alert("Wrong");
}

function changePass(){
passwords[role]=newPass.value;
db.ref("settings/passwords/"+role).set(newPass.value);
alert("Updated");
}

function saveOpen(){
db.ref("settings/open").set(+openAmt.value);
}

// LOCK
function lockData(){
if(role!=="admin") return alert("Admin only");

["monthly","income","expense","utsav"].forEach(p=>{
db.ref("data/"+year+"/"+p).once("value",s=>{
Object.keys(s.val()||{}).forEach(k=>{
db.ref("data/"+year+"/"+p+"/"+k+"/locked").set(true);
});
});
});
  
alert("Locked");
}

// APPROVE
function approve(){
if(role==="admin") return alert("Admin not allowed");
db.ref("settings/approvals/"+role).set(true);
alert("Approved");
}

// ROUTE
function page(e,p){

document.querySelectorAll('.tabs div').forEach(el=>el.classList.remove('active'));

e.target.classList.add('active');

if(p==="dashboard") dashboard();
if(p==="members") members();
if(p==="monthly") monthly();
if(p==="utsav") utsav();
if(p==="income") income();
if(p==="expense") expense();
if(p==="settings") settings();

}

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js')
      .then(reg => console.log("SW registered"))
      .catch(err => console.log("SW error", err));
  });
}
  
/* ✅ YEH NAYA CODE */
let deferredPrompt;

window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;
});

function installApp(){
  if(deferredPrompt){
    deferredPrompt.prompt();
  } else {
    alert("Install option not ready yet");
  }
}
